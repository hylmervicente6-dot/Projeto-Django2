<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Django DF — Concursos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0d1117; color: #e6edf3; }
    a { text-decoration: none; color: inherit; }

    .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; border-bottom: 1px solid #21262d; background: #0d1117; position: sticky; top: 0; z-index: 100; }
    .navbar-brand { font-size: 20px; font-weight: 600; color: #58a6ff; }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a { color: #8b949e; font-size: 14px; padding: 0.4rem 0.8rem; border-radius: 6px; transition: background 0.2s; }
    .nav-links a:hover { background: #21262d; color: #e6edf3; }

    .hero-section { text-align: center; padding: 5rem 1rem 4rem; background: #0d1117; }
    .hero-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(56,139,253,0.1); border: 1px solid rgba(56,139,253,0.25); border-radius: 20px; padding: 5px 16px; font-size: 13px; color: #58a6ff; margin-bottom: 1.5rem; }
    .hero-title { font-size: 48px; font-weight: 700; background: linear-gradient(135deg, #e6edf3 0%, #58a6ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1rem; }
    .hero-subtitle { color: #8b949e; font-size: 17px; max-width: 520px; margin: 0 auto 2rem; }
    .hero-btns { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .btn-hero-primary { display: inline-flex; align-items: center; gap: 8px; background: #238636; color: #fff; border-radius: 8px; padding: 11px 24px; font-size: 15px; font-weight: 500; transition: background 0.2s; }
    .btn-hero-primary:hover { background: #2ea043; color: #fff; }
    .btn-hero-secondary { display: inline-flex; align-items: center; gap: 8px; background: transparent; color: #c9d1d9; border: 1px solid #30363d; border-radius: 8px; padding: 11px 24px; font-size: 15px; transition: border-color 0.2s; }
    .btn-hero-secondary:hover { border-color: #58a6ff; color: #58a6ff; }

    .section-dark { background: #0d1117; padding: 3rem 1rem; }
    .section-mid { background: #161b22; padding: 3rem 1rem; }
    .section-heading { text-align: center; font-size: 26px; font-weight: 600; color: #e6edf3; margin-bottom: 0.4rem; }
    .section-sub { text-align: center; font-size: 14px; color: #8b949e; margin-bottom: 2rem; }

    .container { max-width: 1000px; margin: 0 auto; padding: 0 1rem; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }

    .feature-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 1.75rem; transition: border-color 0.2s, transform 0.2s; display: block; color: inherit; }
    .feature-card:hover { border-color: #58a6ff; transform: translateY(-3px); }
    .feature-card .card-icon { font-size: 32px; margin-bottom: 1rem; }
    .feature-card .card-title { font-size: 17px; font-weight: 600; color: #58a6ff; margin-bottom: 0.5rem; }
    .feature-card .card-desc { font-size: 14px; color: #8b949e; line-height: 1.65; }
    .feature-card .card-link { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; color: #58a6ff; margin-top: 1rem; }

    .author-card { background: #0d1117; border: 1px solid #21262d; border-radius: 12px; padding: 1.5rem; text-align: center; transition: border-color 0.2s, transform 0.2s; display: block; color: inherit; }
    .author-card:hover { border-color: #388bfd; transform: translateY(-3px); }
    .author-avatar { width: 56px; height: 56px; border-radius: 50%; background: #21262d; border: 2px solid #30363d; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 1rem; }
    .author-name { font-size: 15px; font-weight: 600; color: #e6edf3; margin-bottom: 0.5rem; }
    .author-email { font-size: 12px; color: #8b949e; margin-bottom: 0.5rem; }
    .author-bio { font-size: 13px; color: #8b949e; line-height: 1.6; margin-top: 0.75rem; border-top: 1px solid #21262d; padding-top: 0.75rem; }

    .breadcrumb { font-size: 13px; color: #8b949e; margin-bottom: 1.5rem; }
    .breadcrumb a { color: #58a6ff; }

    .artigo-list { display: flex; flex-direction: column; gap: 20px; max-width: 860px; margin: 0 auto; }
    .artigo-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; }
    .artigo-autor-header { display: flex; align-items: center; gap: 12px; padding: 1rem 1.5rem; border-bottom: 1px solid #21262d; background: #0d1117; }
    .author-avatar-sm { width: 40px; height: 40px; border-radius: 50%; background: #21262d; border: 1px solid #30363d; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .artigo-autor-nome { font-size: 14px; font-weight: 600; color: #e6edf3; }
    .artigo-autor-email { font-size: 12px; color: #8b949e; }
    .artigo-data { margin-left: auto; font-size: 12px; color: #8b949e; white-space: nowrap; }
    .artigo-body { padding: 1.5rem; font-size: 15px; color: #c9d1d9; line-height: 1.75; }
    .artigo-body h1, .artigo-body h2, .artigo-body h3 { color: #e6edf3; margin: 1rem 0 0.5rem; }
    .artigo-body p { margin-bottom: 0.75rem; }
    .artigo-creditos { padding: 0.75rem 1.5rem; border-top: 1px solid #21262d; font-size: 12px; color: #8b949e; background: #0d1117; }
    .artigo-creditos strong { color: #58a6ff; }

    .empty-state { text-align: center; padding: 4rem 1rem; color: #8b949e; }
    .empty-state p { margin: 1rem 0 1.5rem; }

    .site-footer { background: #161b22; border-top: 1px solid #21262d; padding: 2rem 1rem; text-align: center; color: #8b949e; font-size: 13px; }
  </style>
</head>
<body>

{% load static %}

<nav class="navbar">
  <a href="{% url 'index' %}" class="navbar-brand">🚀 Django DF</a>
  <div class="nav-links">
    <a href="{% url 'index' %}">Início</a>
    <a href="{% url 'autores' %}">Autores</a>
    <a href="{% url 'artigo' %}">Artigos</a>
  </div>
</nav>

{% block content %}{% endblock %}

<footer class="site-footer">
  <p>© 2026 Django DF — Conteúdo dos respectivos autores e plataformas.</p>
</footer>

</body>
</html>
